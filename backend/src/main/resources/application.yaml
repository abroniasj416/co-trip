spring:
  application:
    name: cotrip

  datasource:
    url: jdbc:postgresql://localhost:5432/cotrip
    username: cotrip
    password: cotrip1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080