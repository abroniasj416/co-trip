spring:
  application:
    name: cotrip

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:Y29Db3RyaXAtc2VjcmV0LWtleS1mb3ItaG1hYy1zaGEyNTYtYWxnb3JpdGht}
  expiration-ms: ${JWT_EXPIRATION_MS:1800000}

ncp:
  client-id: ${NCP_CLIENT_ID:}
  client-secret: ${NCP_CLIENT_SECRET:}

naver-search:
  client-id: ${NAVER_SEARCH_CLIENT_ID:}
  client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
