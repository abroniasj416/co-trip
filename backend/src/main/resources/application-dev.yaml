# =============================================
# Dev Profile - 로컬 개발 환경
# =============================================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cotrip
    username: cotrip
    password: cotrip1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  web:
    cors:
      allowed-origins: http://localhost:3000,http://localhost:3001

logging:
  level:
    com.cotrip: DEBUG
    org.springframework.web: DEBUG
