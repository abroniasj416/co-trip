version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: cotrip-postgres
    environment:
      POSTGRES_DB: cotrip
      POSTGRES_USER: cotrip
      POSTGRES_PASSWORD: cotrip1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cotrip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: